# Frontend → GitHub Pages. Runs on branch `pages` or manual dispatch only (not default branch).
# Settings → Pages → Source: GitHub Actions.
# Secrets: VITE_API_URL (API Gateway stage base, same as local frontend/.env).
# Variables (optional): VITE_BASE — unset uses /{repo}/ for project Pages.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - pages
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify frontend sources
        run: test -f frontend/package-lock.json && test -f frontend/src/config/athenaAllowlist.ts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_BASE: ${{ vars.VITE_BASE != '' && vars.VITE_BASE || format('/{0}/', github.event.repository.name) }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
